services:
  blog:
    image: ghost:5-alpine
    restart: unless-stopped
    ports:
      - "2368:2368"
    volumes:
      # Maps local folder ./ghost/content to the container.
      - ./ghost/content:/var/lib/ghost/content
    environment:
      # Ghost Configuration
      url: ${GHOST_URL}
      NODE_ENV: production
      
      # Database Configuration
      database__client: mysql
      database__connection__host: database
      database__connection__port: 3306
      database__connection__user: ${DB_USER}
      database__connection__password: ${DB_PASSWORD}
      database__connection__database: ${DB_NAME}

      # Mail Configuration (Mailpit for local development)
      mail__transport: SMTP
      mail__options__host: mailpit
      mail__options__port: 1025
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.0
    restart: unless-stopped
    cap_add:
      - SYS_NICE  # Suppresses mbind: Operation not permitted warnings
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Local folder to persist DB data
      - ./ghost/mysql-data:/var/lib/mysql
    # Healthcheck ensures the DB is ready before Ghost tries to connect
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    ports:
      - "13928:3306"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI to view caught emails
      - "1025:1025"   # SMTP port